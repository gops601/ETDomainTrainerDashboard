{% extends "base.html" %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h2>Edit Entry #{{ entry.id }} ({{ entry.trainer.name }})</h2>
        <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary">Cancel</a>
    </div>
    
    <form method="POST" action="{{ url_for('edit_entry', id=entry.id) }}">
        
        <div style="display: flex; gap: 1rem; margin-bottom: 2rem;">
            <div class="form-group" style="flex: 1;">
                <label class="form-label">Week From Date</label>
                <input type="date" name="from_date" class="form-control" value="{{ entry.from_date.strftime('%Y-%m-%d') }}" required>
            </div>
            <div class="form-group" style="flex: 1;">
                <label class="form-label">Week To Date</label>
                <input type="date" name="to_date" class="form-control" value="{{ entry.to_date.strftime('%Y-%m-%d') }}" required>
            </div>
        </div>

        <div class="card-header" style="margin-top: 1rem;">
            <h3>Training Details</h3>
        </div>

        <div class="entry-row" style="grid-template-columns: 1fr;">
            <div class="form-group">
                <label class="form-label" style="display: flex; align-items: center; gap: 0.5rem;">
                    <input type="checkbox" id="is-training-cb" value="false" {% if not entry.is_training %}checked{% endif %}>
                    <span>This is a Non-Training Activity (e.g. Leave, Internal Meeting)</span>
                </label>
                <input type="hidden" name="is_training" id="is-training-hidden" value="{{ 'true' if entry.is_training else 'false' }}">
            </div>

            <div class="form-group training-field" style="{% if not entry.is_training %}display: none;{% endif %}">
                <label class="form-label">OU</label>
                <select name="ou_id" id="ou-select" class="form-control" {% if entry.is_training %}required{% endif %}>
                    <option value="">Select OU</option>
                    {% for ou in ous %}
                    <option value="{{ ou.id }}" {% if entry.ou_id == ou.id %}selected{% endif %}>{{ ou.name }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="form-group training-field" style="{% if not entry.is_training %}display: none;{% endif %}">
                <label class="form-label">Training Type</label>
                <select name="type_id" id="type-select" class="form-control" {% if entry.is_training %}required{% endif %}>
                    <option value="">Select Type</option>
                    {% for t in types %}
                    <option value="{{ t.id }}" {% if entry.training_type_id == t.id %}selected{% endif %}>{{ t.name }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="form-group">
                <label class="form-label">Title</label>
                <input type="text" name="title" class="form-control" value="{{ entry.title }}" required>
            </div>
            
            <div class="form-group">
                <label class="form-label">Duration (hrs)</label>
                <input type="number" name="duration" class="form-control" value="{{ entry.duration }}" required min="0" step="0.5">
            </div>
            
            <div class="form-group training-field" style="{% if not entry.is_training %}display: none;{% endif %}">
                <label class="form-label">Participants</label>
                <input type="number" name="participants" class="form-control" value="{{ entry.participants_count or '' }}" {% if entry.is_training %}required{% endif %} min="1">
            </div>
            
            <div class="form-group training-field" style="{% if not entry.is_training %}display: none;{% endif %}">
                <label class="form-label">Mode</label>
                <select name="mode" class="form-control" {% if entry.is_training %}required{% endif %}>
                    <option value="Online" {% if entry.mode == 'Online' %}selected{% endif %}>Online</option>
                    <option value="Offline" {% if entry.mode == 'Offline' %}selected{% endif %}>Offline</option>
                </select>
            </div>
            
            <div class="form-group" style="grid-column: span 1;">
                <label class="form-label">Remarks / Feedback</label>
                <textarea name="remarks" class="form-control" rows="2" style="resize: vertical;">{{ entry.remarks or '' }}</textarea>
            </div>
        </div>

        <button type="submit" class="btn btn-primary" style="margin-top: 1rem; width: 100%; font-size: 1rem; padding: 0.75rem;">Save Changes</button>
    </form>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const isTrainingCb = document.getElementById('is-training-cb');
    const hiddenInput = document.getElementById('is-training-hidden');
    const trainingFields = document.querySelectorAll('.training-field');
    
    if (isTrainingCb) {
        isTrainingCb.addEventListener('change', function() {
            const isChecked = this.checked;
            hiddenInput.value = isChecked ? 'false' : 'true';
            
            trainingFields.forEach(field => {
                if (isChecked) {
                    field.style.display = 'none';
                    field.querySelectorAll('input, select').forEach(input => input.removeAttribute('required'));
                } else {
                    field.style.display = 'block';
                    field.querySelectorAll('input, select').forEach(input => input.setAttribute('required', 'required'));
                }
            });
        });
    }
});
</script>
{% endblock %}
